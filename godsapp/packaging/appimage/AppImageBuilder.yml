version: 1
script:
  - python3 -m build --wheel --no-isolation
  - rm -rf AppDir
  - mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
  - cp packaging/com.sierengowski.GodsApp.svg AppDir/usr/share/icons/hicolor/scalable/apps/
  - cp packaging/debian/godsapp.desktop AppDir/usr/share/applications/com.sierengowski.GodsApp.desktop
  - python3 -m venv --system-site-packages AppDir/usr
  - AppDir/usr/bin/pip install dist/*.whl

AppDir:
  path: ./AppDir
  app_info:
    id: com.sierengowski.GodsApp
    name: GodsApp
    icon: com.sierengowski.GodsApp
    version: 0.1.0
    exec: usr/bin/python3
    exec_args: -m godsapp $@
  apt:
    arch: amd64
    sources:
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main universe
    include:
      - python3
      - python3-gi
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - libadwaita-1-0

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|jsierengowski|godsapp|latest|GodsApp-*x86_64.AppImage.zsync
  sign-key: None
