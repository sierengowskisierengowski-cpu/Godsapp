          type: array
          items:
            $ref: "#/components/schemas/ToolCount"

    FindingCounts:
      type: object
      required: [critical, high, medium, low, info, total]
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        info:
          type: integer
        total:
          type: integer

    DailyCount:
      type: object
      required: [date, count]
      properties:
        date:
          type: string
        count:
          type: integer

    ToolCount:
      type: object
      required: [tool, count]
      properties:
        tool:
          type: string
        count:
          type: integer

    # ── Scans ───────────────────────────────────────────────────────────────
    Scan:
      type: object
      required: [id, workspaceId, tool, target, status, createdAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        tool:
          type: string
        target:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, stopped]
        profile:
          type: ["string", "null"]
        options:
          type: object
          additionalProperties: true
        progress:
          type: ["integer", "null"]
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        resultSummary:
          type: ["string", "null"]
        findingCount:
          type: integer

    ScanInput:
      type: object
      required: [tool, target]
      properties:
        tool:
          type: string
        target:
          type: string
        profile:
          type: string
        options:
          type: object
          additionalProperties: true

    ScanDetail:
      type: object
      required: [scan, output, hosts]
      properties:
