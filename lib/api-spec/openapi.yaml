        country:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        asn:
          type: ["string", "null"]
        org:
          type: ["string", "null"]
        isTor:
          type: boolean
        isVpn:
          type: boolean
        isKnownMalicious:
          type: boolean
        abuseScore:
          type: ["integer", "null"]
        vtMalicious:
          type: ["integer", "null"]
        reverseDns:
          type: ["string", "null"]
        sources:
          type: array
          items:
            $ref: "#/components/schemas/IntelSource"

    IntelSource:
      type: object
      required: [name, available, data]
      properties:
        name:
          type: string
        available:
          type: boolean
        data:
          type: object
          additionalProperties: true
        error:
          type: ["string", "null"]

    HibpInput:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [email, password]
        value:
          type: string

    HibpResult:
      type: object
      required: [found, count]
      properties:
        found:
          type: boolean
        count:
          type: integer
        breaches:
          type: array
          items:
            $ref: "#/components/schemas/Breach"

    Breach:
      type: object
      required: [name, breachDate]
      properties:
        name:
          type: string
        breachDate:
          type: string
        dataClasses:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        isVerified:
          type: boolean

    # ── Plugins ─────────────────────────────────────────────────────────────
    Plugin:
      type: object
      required: [id, name, category, description, author, version, enabled]
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        description:
          type: string
        author:
          type: string
        version:
          type: string
        enabled:
          type: boolean
        hasNetworkAccess:
          type: boolean
        hasFilesystemAccess:
          type: boolean
        hasSubprocessAccess:
          type: boolean
        loadedAt:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    PluginToggleInput:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    # ── Reports ─────────────────────────────────────────────────────────────
    Report:
      type: object
      required: [id, workspaceId, type, format, status, createdAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        type:
          type: string
          enum: [engagement, findings, evidence, scan, threat_intel, compliance, comparison, daily]
        format:
          type: string
          enum: [pdf, markdown, docx, xlsx, html, json, sarif]
        status:
          type: string
          enum: [generating, ready, failed]
        title:
          type: ["string", "null"]
        findingCount:
          type: integer
        size:
          type: ["integer", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
        options:
          type: object
          additionalProperties: true

    ReportInput:
      type: object
      required: [type, format]
      properties:
        type:
          type: string
          enum: [engagement, findings, evidence, scan, threat_intel, compliance, comparison, daily]
        format:
          type: string
          enum: [pdf, markdown, docx, xlsx, html, json, sarif]
        title:
          type: string
        options:
          type: object
          additionalProperties: true

    # ── Scheduler ───────────────────────────────────────────────────────────
    Schedule:
      type: object
      required: [id, workspaceId, tool, target, cronExpression, enabled, createdAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        tool:
          type: string
        target:
          type: string
        cronExpression:
          type: string
        enabled:
          type: boolean
        lastRun:
          type: ["string", "null"]
        nextRun:
          type: ["string", "null"]
        lastStatus:
          type: ["string", "null"]
        options:
          type: object
          additionalProperties: true
        createdAt:
          type: string

    ScheduleInput:
      type: object
      required: [tool, target, cronExpression]
      properties:
        tool:
          type: string
        target:
          type: string
        cronExpression:
          type: string
        options:
          type: object
          additionalProperties: true
