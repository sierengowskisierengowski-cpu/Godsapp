kind = "web"
previewPath = "/"
title = "GodsApp"
version = "1.0.0"
id = "artifacts/godsapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22381

[services.development]
run = "pnpm --filter @workspace/godsapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/godsapp", "run", "build" ]
publicDir = "artifacts/godsapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22381"
BASE_PATH = "/"
